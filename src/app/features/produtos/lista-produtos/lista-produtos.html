<h2>
    produto selecionado:
    @if(produtoSelecionado()){
        <strong style="color:green;">{{ produtoSelecionado() }}</strong>
        
    }@else{
                <span style="color: gray">nenhum Produto selecionado</span>}
        

</h2>
@for (item of produtos(); track item){
    <app-produto 
    [nome] = "item.nome" 
    [preco] = "item.preco"
    (produtoSelecionado)="exibirProduto($event)"
    >
    </app-produto>
}
 <hr>
 <p><button (click)="adicionaProduto()">Adicionar Produto</button></p>
 <p><button (click)="substituirProduto()">Substituir Produto</button></p>
 <hr>
 <h2>total  de Produto: {{ totalProdutos() }}</h2>
 <h3>Valor Total: {{ valorTotal() | precoFormatado}}</h3>
 <hr>
